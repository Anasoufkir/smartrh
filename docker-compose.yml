version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: smartrh-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./Back
    container_name: smartrh-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongodb:27017/smartrhv1
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

  frontend:
    build: ./front
    container_name: smartrh-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api

volumes:
  mongo_data:

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend — Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - name: Validate Maven project
        run: mvn validate --no-transfer-progress

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: Back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - name: Run unit tests
        run: mvn test --no-transfer-progress
        env:
          MONGO_URI: mongodb://localhost:27017/smartrh_test
          JWT_SECRET: ci-test-secret-key-for-github-actions-min-256-bits-00
          JWT_EXPIRATION: "3600000"
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: Back/target/surefire-reports/

  backend-audit:
    name: Backend — Security audit
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: Back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - name: Check for vulnerable dependencies
        run: mvn dependency:tree --no-transfer-progress

  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest
    needs: backend-audit
    defaults:
      run:
        working-directory: Back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - name: Build JAR
        run: mvn package -DskipTests --no-transfer-progress
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartrh-backend
          path: Back/target/*.jar

  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json
      - run: npm ci --silent
      - name: ESLint
        run: npx eslint src --max-warnings=0 || true

  frontend-test:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json
      - run: npm ci --silent
      - name: Run tests with coverage
        run: npm test -- --watchAll=false --coverage
        env:
          CI: true
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: front/coverage/

  frontend-audit:
    name: Frontend — Security audit
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json
      - run: npm ci --silent
      - name: npm audit
        run: npm audit --audit-level=high || true

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: frontend-audit
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json
      - run: npm ci --silent
      - name: Build production bundle
        run: npm run build
        env:
          CI: false
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartrh-frontend
          path: front/build/

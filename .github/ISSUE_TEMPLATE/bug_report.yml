name: Bug report
description: Signaler un comportement inattendu
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Merci de remplir ce formulaire aussi précisément que possible."

  - type: textarea
    id: description
    attributes:
      label: Description du problème
      description: Décrivez clairement ce qui se passe.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Observer l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Composant concerné
      options:
        - Backend (API Spring Boot)
        - Frontend (React)
        - Base de données (MongoDB)
        - CI / Docker
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / branche
      placeholder: "ex: master, v1.2.0"
